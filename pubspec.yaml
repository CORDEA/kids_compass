name: compass
description: "A distraction-free compass app for Japanese elementary school students."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  hooks_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0
  flutter_hooks: ^0.21.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.4
  package_info_plus: ^9.0.0

  intl: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^3.0.0
  freezed: ^3.0.0
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true
  generate: true
